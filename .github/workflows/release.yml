name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - name: Verify version tag
        run: |
          APP_VERSION=$(node -p "require('./webos-shell-app/appinfo.json').version")
          test "$GITHUB_REF_NAME" = "v$APP_VERSION"
      - name: Run tests
        run: |
          for test in tests/test-*.js; do node "$test"; done
          sh tests/test-baseline.sh
      - name: Install webOS CLI
        run: npm install --global @webos-tools/cli@3.2.5
      - name: Build generic IPK
        run: ./scripts/package-tv-shell.sh
      - name: Inspect generic IPK
        run: ./scripts/inspect-ipk.sh
      - name: Prepare release assets
        run: |
          APP_ID=$(node -p "require('./webos-shell-app/appinfo.json').id")
          APP_VERSION=$(node -p "require('./webos-shell-app/appinfo.json').version")
          PACKAGE="dist/${APP_ID}_${APP_VERSION}_all.ipk"
          PACKAGE_NAME=$(basename "$PACKAGE")
          test -f "$PACKAGE"
          (cd dist && sha256sum "$PACKAGE_NAME") > SHA256SUMS
          echo "PACKAGE=$PACKAGE" >> "$GITHUB_ENV"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$PACKAGE" SHA256SUMS --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$PACKAGE" SHA256SUMS \
              --generate-notes \
              --title "Ploff $GITHUB_REF_NAME"
          fi
